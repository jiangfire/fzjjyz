name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.1)'
        required: false
        type: string

permissions:
  contents: write

env:
  GO_VERSION: '1.25'
  PROJECT_NAME: 'fzj'

jobs:
  # 测试和质量检查
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: |
          go test ./... -v -race -coverprofile=coverage.out -covermode=atomic -timeout 5m

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout 5m

      - name: Build check
        run: go build -o /dev/null ./cmd/fzjjyz

      - name: Test binary
        run: |
          go build -o fzj-test ./cmd/fzjjyz
          ./fzj-test version
          ./fzj-test --help
          rm fzj-test

  # 跨平台构建
  build:
    name: Build for ${{ matrix.os }}-${{ matrix.arch }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-latest
          - os: darwin
            arch: amd64
            runner: macos-latest
          - os: darwin
            arch: arm64
            runner: macos-latest
          - os: windows
            arch: amd64
            runner: windows-latest
          - os: windows
            arch: arm64
            runner: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Get version info
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [[ "$VERSION" == "v"* ]]; then
            VERSION=${VERSION#v}
          fi
          if [[ -z "$VERSION" ]]; then
            VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Git commit: ${{ github.sha }}"
          echo "Version: $VERSION"

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          mkdir -p dist
          OUTPUT="dist/${{ env.PROJECT_NAME }}-${{ matrix.os }}-${{ matrix.arch }}"
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            OUTPUT="${OUTPUT}.exe"
          fi

          go build -ldflags "-s -w -X main.Version=$VERSION -X main.BuildTime=$(date -u +"%Y-%m-%dT%H:%M:%SZ") -X main.GitCommit=${{ github.sha }}" \
            -o "$OUTPUT" ./cmd/fzjjyz

          chmod +x "$OUTPUT"
          echo "Built: $OUTPUT"
          ls -lh "$OUTPUT"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/${{ env.PROJECT_NAME }}-${{ matrix.os }}-${{ matrix.arch }}*
          retention-days: 7

  # 创建发布包
  package:
    name: Package & Release
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release assets
        id: prepare
        shell: bash
        run: |
          # 获取版本
          VERSION=${GITHUB_REF#refs/tags/}
          if [[ "$VERSION" == "v"* ]]; then
            VERSION=${VERSION#v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # 创建发布目录
          mkdir -p release
          cd artifacts

          # 处理每个二进制文件
          for file in fzj-*; do
            if [[ -f "$file" ]]; then
              # 保持原名，但确保 windows 文件有 .exe
              if [[ "$file" == *"windows"* ]] && [[ "$file" != *.exe ]]; then
                mv "$file" "${file}.exe"
                echo "Renamed: $file -> ${file}.exe"
              fi
              cp "$file" ../release/
              echo "Copied: $file"
            fi
          done

          cd ../release
          echo "=== Release files ==="
          ls -lh

          # 为每个文件生成单独的 .sha256 文件
          echo "=== Generating individual checksums ==="
          for file in *; do
            if [[ -f "$file" ]] && [[ "$file" != *.sha256 ]]; then
              sha256sum "$file" > "${file}.sha256"
              echo "Created: ${file}.sha256"
            fi
          done

          echo "=== All files ==="
          ls -lh

      - name: Generate release notes
        id: release_notes
        shell: bash
        run: |
          # 检查是否有 RELEASE_NOTES.md
          if [ -f "RELEASE_NOTES.md" ]; then
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "## 🎉 Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            cat RELEASE_NOTES.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            # 从 git 生成
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "## 🎉 Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "### ✨ 功能特性" >> $GITHUB_OUTPUT
            echo "- 后量子加密算法 (Kyber768 + Dilithium3)" >> $GITHUB_OUTPUT
            echo "- 混合加密 (Kyber + ECDH)" >> $GITHUB_OUTPUT
            echo "- AES-256-GCM 数据加密" >> $GITHUB_OUTPUT
            echo "- 多语言支持 (中文/英文)" >> $GITHUB_OUTPUT
            echo "- 目录批量加密" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "### 📦 下载说明" >> $GITHUB_OUTPUT
            echo "- **Linux**: 下载 \`fzj-linux-amd64\` 或 \`fzj-linux-arm64\`" >> $GITHUB_OUTPUT
            echo "- **macOS**: 下载 \`fzj-darwin-amd64\` 或 \`fzj-darwin-arm64\`" >> $GITHUB_OUTPUT
            echo "- **Windows**: 下载 \`fzj-windows-amd64.exe\` 或 \`fzj-windows-arm64.exe\`" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "### 🔍 校验和" >> $GITHUB_OUTPUT
            echo "所有文件的 SHA256 校验和已包含在 \`checksums.sha256\` 文件中。" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "### 🚀 快速开始" >> $GITHUB_OUTPUT
            echo "\`\`\`bash" >> $GITHUB_OUTPUT
            echo "# 查看帮助" >> $GITHUB_OUTPUT
            echo "./fzj --help" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "# 生成密钥对" >> $GITHUB_OUTPUT
            echo "./fzj keygen" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "# 加密文件" >> $GITHUB_OUTPUT
            echo "./fzj encrypt -i input.txt -o output.fzj --pubkey public.key" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "# 解密文件" >> $GITHUB_OUTPUT
            echo "./fzj decrypt -i output.fzj -o decrypted.txt --privkey private.key --verify verify.key" >> $GITHUB_OUTPUT
            echo "\`\`\`" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "---" >> $GITHUB_OUTPUT
            echo "*构建时间: ${{ github.event.repository.updated_at }}*" >> $GITHUB_OUTPUT
            echo "*Git Commit: ${{ github.sha }}*" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.body }}
          draft: false
          prerelease: false
          files: |
            release/*
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        shell: bash
        run: |
          echo "## 发布完成 ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**版本**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 可用文件" >> $GITHUB_STEP_SUMMARY
          cd release
          for file in *; do
            echo "- \`$file\`" >> $GITHUB_STEP_SUMMARY
          done

  # 手动触发的单平台构建
  manual-build:
    name: Manual Build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build for Linux
        run: |
          VERSION=${{ github.event.inputs.version || 'manual' }}
          mkdir -p dist
          go build -ldflags "-s -w -X main.Version=$VERSION" -o dist/${{ env.PROJECT_NAME }} ./cmd/fzjjyz
          chmod +x dist/${{ env.PROJECT_NAME }}
          ls -lh dist/
          ./dist/${{ env.PROJECT_NAME }} version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-manual
          path: dist/${{ env.PROJECT_NAME }}
          retention-days: 30